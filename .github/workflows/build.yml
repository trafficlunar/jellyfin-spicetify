name: build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build-local
      - uses: actions/upload-artifact@v7
        with:
          name: jellyfin-spicetify
          path: dist/jellyfin-spicetify.js
          # archive: false
